name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run from the same ref when a newer commit lands.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Type-check, unit tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b

      - name: Run unit tests
        run: npm test

      - name: Build (smoke)
        run: npm run build
        env:
          # The client throws at import time without these. CI-only stub values —
          # build doesn't actually contact Supabase.
          VITE_SUPABASE_URL: https://ci-stub.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-stub-anon-key
